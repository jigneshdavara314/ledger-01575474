name: edge-scan
# Heavy 15-day edge scan — runs ON GITHUB's machines (free), not the user's PC.
# Manual trigger only. Commits edge_scan15_result.json back for review.

on:
  schedule:
    # Continuous hunting: once daily at 06:00 UTC. Each run re-scans the latest
    # 15-day window on GitHub's machines (never the user's PC) and commits the
    # result + appends to an edge history log.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Days of resolved markets to scan"
        required: false
        default: "15"

permissions:
  contents: write

concurrency:
  group: edge-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run 15-day edge scan
        env:
          DAYS: ${{ github.event.inputs.days || '15' }}
        run: |
          echo "::group::edge scan"
          PYTHONPATH=. python -m polybot.edge_scan15 "$DAYS" || true
          echo "::endgroup::"
      - name: Commit result + append history
        run: |
          git config user.name "edge-scan-bot"
          git config user.email "bot@users.noreply.github.com"
          git add edge_scan15_result.json edge_scan_history.jsonl 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No result file produced."
          else
            git commit -m "edge-scan: latest 15-day result [skip ci]"
            git pull --rebase --autostash origin master || true
            git push
          fi
