name: edge-scan
# Heavy 15-day edge scan — runs ON GITHUB's machines (free), not the user's PC.
# Manual trigger only. Commits edge_scan15_result.json back for review.

on:
  schedule:
    # Hourly hunting. Honest note: more frequency finds little NEW edge (the
    # 45-day data changes slowly), but it (a) confirms multi-day recurrence sooner,
    # (b) catches newly-resolved markets faster, and (c) survives GitHub's
    # occasionally-skipped scheduler ticks. The breadth levers (45d lookback, more
    # families, classified 'other') are what actually surface MORE edges.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "Days of resolved markets to scan"
        required: false
        default: "15"

permissions:
  contents: write

concurrency:
  group: edge-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Auto-discover candidate families (suggestions; gate still validates)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        run: |
          echo "::group::discover families"
          PYTHONPATH=. python -m polybot.discover_families || true
          echo "::endgroup::"
      - name: Run edge scan
        env:
          DAYS: ${{ github.event.inputs.days || '45' }}
        run: |
          echo "::group::edge scan"
          PYTHONPATH=. python -m polybot.edge_scan15 "$DAYS" || true
          echo "::endgroup::"
      - name: Commit result + append history
        run: |
          git config user.name "edge-scan-bot"
          git config user.email "bot@users.noreply.github.com"
          git add edge_scan15_result.json edge_scan_history.jsonl discovered_families.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No result file produced."; exit 0
          fi
          git commit -m "edge-scan: latest 15-day result [skip ci]"
          # Push with retry: concurrent bot/edge-scan commits race on the branch,
          # so pull-rebase-push up to 5x instead of failing on the first conflict.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin master || true
            if git push; then echo "pushed on attempt $i"; exit 0; fi
            echo "push attempt $i failed; retrying..."; sleep 5
          done
          echo "push failed after retries (result is committed locally; next run re-pushes)"
          exit 0   # don't fail the whole workflow over a transient push race
