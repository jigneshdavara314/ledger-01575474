name: edge-scan
# Heavy 15-day edge scan — runs ON GITHUB's machines (free), not the user's PC.
# Manual trigger only. Commits edge_scan15_result.json back for review.

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Days of resolved markets to scan"
        required: false
        default: "15"

permissions:
  contents: write

concurrency:
  group: edge-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run 15-day edge scan
        run: |
          echo "::group::edge scan"
          PYTHONPATH=. python -m polybot.edge_scan15 ${{ github.event.inputs.days }} || true
          echo "::endgroup::"
      - name: Commit result
        run: |
          git config user.name "edge-scan-bot"
          git config user.email "bot@users.noreply.github.com"
          git add edge_scan15_result.json
          if git diff --staged --quiet; then
            echo "No result file produced."
          else
            git commit -m "edge-scan: 15-day result [skip ci]"
            git pull --rebase --autostash origin master || true
            git push
          fi
