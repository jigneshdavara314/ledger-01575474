name: polymarket-paper-bot
# (re-indexed for daily cloud scans — runs every 15 min, commits state back)

# Runs the paper-trading bot on a schedule in the cloud (free GitHub Actions).
# Each run: places longshot-fade bets, watches for lag arb, resolves settled
# positions, regenerates the dashboard, and commits trades.db + dashboard.html
# back to the repo so history persists across runs.
#
# PAPER MODE ONLY. No wallet key is used. No real money can move.

on:
  schedule:
    # Every 15 minutes. (GitHub cron min interval is 5 min; 15 is plenty here.)
    # Note: GitHub may delay scheduled runs under load — not real-time.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# Allow the workflow to push commits (the updated DB + dashboard) back.
permissions:
  contents: write

# Never run two copies at once (they'd fight over trades.db).
concurrency:
  group: bot-run
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (gate the cycle — never trade on broken code)
        run: |
          pip install pytest
          PYTHONPATH=. pytest tests/ -q

      - name: Run bot cycle (PAPER)
        env:
          MODE: PAPER
          PROFILE: moderate
        run: |
          echo "::group::longshot fades (conservative book)"
          python run.py longshot || true
          echo "::endgroup::"
          echo "::group::strategy tournament (other 4 books)"
          PYTHONPATH=. python run.py strategies || true
          echo "::endgroup::"
          echo "::group::lag arbitrage"
          python run.py lagwatch || true
          echo "::endgroup::"
          echo "::group::resolve settled positions"
          python run.py resolve || true
          echo "::endgroup::"
          echo "::group::self-improve (auto promote/retune/demote, bounded+logged)"
          PYTHONPATH=. python -m polybot.self_improve || true
          echo "::endgroup::"
          echo "::group::report"
          python run.py report || true
          echo "::endgroup::"
          python dashboard.py

      - name: Publish dashboard to GitHub Pages
        run: |
          mkdir -p public
          cp dashboard.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Commit updated DB + dashboard
        run: |
          git config user.name "polymarket-bot"
          git config user.email "bot@users.noreply.github.com"
          # Persist the learned dials + audit log so self-improvement carries over.
          git add trades.db dashboard.html strategy_state.json self_improve_log.jsonl 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."; exit 0
          fi
          git commit -m "bot run: update trades.db + dashboard + learned state [skip ci]"
          # Resilient push: retry pull-rebase-push to survive races with edge-scan.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin master || true
            if git push; then echo "pushed on attempt $i"; exit 0; fi
            echo "push attempt $i failed; retrying..."; sleep 5
          done
          echo "push failed after retries; next run re-pushes"; exit 0

  # Deploy the dashboard to GitHub Pages (public URL to view from anywhere).
  deploy-pages:
    needs: run-bot
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
